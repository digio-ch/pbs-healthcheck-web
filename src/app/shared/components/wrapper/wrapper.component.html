<div class="app-container">
  <app-header></app-header>

  @if ((person.groups.length === 0)) {
    <a [href]="getNoGroupsLink$() | async" target="_blank">
      <div class="no-groups-info">
        <div class="no-groups-info-header">
          <span>{{'notification.no-groups.title' | translate}}</span>
          <i class="icon-warning"></i>
        </div>
        <span class="info-description" >{{'notification.no-groups.description' | translate}}</span>
      </div>
    </a>
  }

  @if ((person.groups.length > 0)) {
    <div class="router-wrapper">
      <router-outlet></router-outlet>
    </div>
  }

  <app-footer
    [absolute]="loading"
    [hasData]="!filterDatesEmpty"
    [importDate]="latestDate"
    [skipLastImport]="filterLoading"
  ></app-footer>
</div>
