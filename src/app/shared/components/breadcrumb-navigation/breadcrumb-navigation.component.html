
<nav>
  <ng-container *ngFor="let breadcrumb of breadcrumbs; index as i; last as isLast">
    <span class="breadcrumb" (click)="navigate(i)">{{breadcrumb.translate ? (breadcrumb.key | translate) : breadcrumb.key}}</span>
    <span class="separator" *ngIf="!isLast">></span>
  </ng-container>
</nav>
