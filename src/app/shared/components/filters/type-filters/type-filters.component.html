@if ((loadingFilters$ | async) === false) {
  <div class="type-filter-container">
    @for (pt of peopleTypes; track pt.name) {
      <app-filter-chip
        [selected]="pt.selected"
        [color]="pt.color"
        [disabled]="shouldBeDisabled(peopleTypes, pt)"
        (selectionChange)="onTypeFilterChange(pt, $event)">
        {{ 'filter.' + pt.name | translate }}
      </app-filter-chip>
    }
    <div class="filter-divider"></div>
    @for (gt of groupTypes; track gt.id) {
      <app-filter-chip
        [selected]="gt.selected"
        [color]="gt.color"
        [disabled]="shouldBeDisabled(groupTypes, gt)"
        (selectionChange)="onTypeFilterChange(gt, $event)">
        {{gt.label}}
      </app-filter-chip>
    }
  </div>
}
