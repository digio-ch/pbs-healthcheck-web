
@if ((filtersLoading$|async) === false) {
  @if (filterDatesEmpty === false) {
    @if ((filtersLoading$|async) === false) {
      <div class="header">
        <ng-content select="[header]"></ng-content>
      </div>
    }
    @if ((widgetDataError$|async) === false) {
      @if ((widgetsLoading$|async) === false) {
        <ng-content select="[body]" />
      } @else {
        <app-loading />
      }
    }
  } @else {
    <div class="centered-div">
      <h2>
        {{ 'notification.no-data' | translate }}
      </h2>
    </div>
  }
} @else {
  <app-loading />
}
