
<div class="app-grid">
  @for (app of apps; track app.name) {
    <div class="card app" (click)="goTo(app)">
      <div class="card-header">
        <h2>{{'apps.' + app.translationKey + '.name' | translate}}</h2>
      </div>
      <div class="card-content">
        @if (app.name === 'overview') {
          <app-widgets-app-preview></app-widgets-app-preview>
        }
        @if (app.name === 'quap') {
          <app-quap-app-preview></app-quap-app-preview>
        }
        @if (app.name === 'quap-departments') {
          <app-quap-departments-app-preview></app-quap-departments-app-preview>
        }
        @if (app.name === 'census') {
          <app-census-app-preview style="width: 100%;"></app-census-app-preview>
        }
        @if (app.name === 'overview-departments') {
          <app-overview-departments-app-preview></app-overview-departments-app-preview>
        }
      </div>
    </div>
  }
</div>
