
@if (loading) {
  <app-loading></app-loading>
}

@if (!loading) {
  <div class="card">
    <div class="card-header">
      <h2 class="chart-title">{{ 'quap.overview.department.title' | translate: { department: data.groupName } }}</h2>
      <div class="button-menu">
        @if (!settings.showNotRelevant) {
          <app-info messageKey="quap.settings.info" colorCode="blue" iconClass="icon-info"></app-info>
        }
        <button mat-icon-button (click)="openDetailDialog()" [title]="'quap.detail.title' | translate">
          <mat-icon>visibility</mat-icon>
        </button>
        <button mat-icon-button (click)="openEvaluationDialog()" [title]="'quap.evaluation.title' | translate">
          <mat-icon>assignment</mat-icon>
        </button>
        <button mat-icon-button (click)="openSettingsDialog()" [title]="'quap.settings.title' | translate">
          <mat-icon>more_vert</mat-icon>
        </button>
      </div>
    </div>
    @if (data && questionnaire) {
      <div class="chart-container">
        <app-graph-container [questionnaire]="questionnaire" [answers]="data.answers" [computedAnswers]="data.computedAnswers" [disabled]="true" [groupType]="data.groupType"></app-graph-container>
      </div>
    }
  </div>
}
