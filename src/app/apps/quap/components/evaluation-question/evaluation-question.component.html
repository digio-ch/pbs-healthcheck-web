<div class="question-row">
  <span class="question">{{ question.question }} @if (isComputed()) {
    <span class="according-to-midata"
      >({{ 'quap.evaluation.according-to-midata' | translate }}
    )</span>
  }</span>
  <div class="answer-container">
    @for (answerOption of answerOptions; track answerOption.tag) {
      <div class="answer"
        [title]="('quap.answers.' + answerOption.tag) | translate">
        @if (allowsAnswerOption(answerOption.option)) {
          <input type="radio" (click)="change($event, answerOption.option)"
            [checked]="(computedAnswer === answerOption.option && currentAnswer === 0) || currentAnswer === answerOption.option"
            [disabled]="disabled(answerOption.option)">
        }
      </div>
    }
  </div>
</div>
