
<div class="content-wrapper">
  @if (!filterLoading) {
    <div class="content-header">
      <app-date-picker-input [supportsDateRange]="false"></app-date-picker-input>
    </div>
  }

  @if (filterLoading || dataLoading) {
    <app-loading></app-loading>
  }

  @if (!dataLoading) {
    <router-outlet></router-outlet>
  }
</div>
