
<div class="content-wrapper">
  @if (loadedDate) {
    <div class="content-header">
      <app-date-picker-input [supportsDateRange]="false"></app-date-picker-input>
    </div>
  }

  @if (loading) {
    <app-loading></app-loading>
  }

  @if (!loading) {
    <div>
      <div class="card">
        <div class="card-header">
          <h2>{{ 'quap.title' | translate }}</h2>
          <div class="button-menu">
            @if (!settings.showNotRelevant) {
              <app-info messageKey="quap.settings.info" colorCode="blue" iconClass="icon-info"></app-info>
            }
            <button mat-icon-button (click)="openDetailDialog()" [title]="'quap.detail.title' | translate">
              <mat-icon>visibility</mat-icon>
            </button>
            <button mat-icon-button (click)="openEvaluationDialog()" [title]="'quap.evaluation.title' | translate">
              <mat-icon>assignment</mat-icon>
            </button>
            <button mat-icon-button (click)="openSettingsDialog()" [title]="'quap.settings.title' | translate">
              <mat-icon>more_vert</mat-icon>
            </button>
          </div>
        </div>
        <div class="card-content">
          <app-graph-container [questionnaire]="questionnaire" [answers]="answers" [computedAnswers]="computedAnswers" [groupType]="group.groupType.groupType" [disabled]="!editRights"></app-graph-container>
        </div>
      </div>
    </div>
  }
</div>
