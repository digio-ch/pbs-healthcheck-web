
<div class="content-wrapper">
  <div class="content-header" *ngIf="!(filterLoading$ | async)">
    <span #appWidgetFilter style="display: none"></span>
    <div class="right-filter-wrapper">
      <app-date-picker-input [supportsDateRange]="supportsRange" *ngIf="supportsDateSelect"></app-date-picker-input>
      <ng-container *ngIf="displaySettings">
        <div class="filter-divider"></div>
        <button class="options-btn" (click)="openSettings()">
          <mat-icon>more_vert</mat-icon>
        </button>
      </ng-container>
    </div>
  </div>

  <app-loading *ngIf="(filterLoading$ | async) || (loading$ | async)"></app-loading>

  <div class="centered-div" *ngIf="error$ | async">
    <h2>{{'notification.no-data' | translate}}</h2>
  </div>

  <div 
    appWidgetGrid
    [pageType]="pageType"
    [isRange]="isRange"
    [ngStyle]="{display: (filterLoading$ | async) ? 'none' : 'grid', visibility: (loading$ | async) ? 'hidden' : 'visible'}"
    class="widget-grid-container"
  >
    <ng-template appWidget></ng-template>
  </div>
</div>
