
<div class="content-wrapper">
  @if (!(filterLoading$ | async)) {
    <div class="content-header">
      <span #appWidgetFilter style="display: none"></span>
      <div class="right-filter-wrapper">
        @if (supportsDateSelect) {
          <app-date-picker-input [supportsDateRange]="supportsRange"></app-date-picker-input>
        }
        @if (displaySettings) {
          <div class="filter-divider"></div>
          <button class="options-btn" (click)="openSettings()">
            <mat-icon>more_vert</mat-icon>
          </button>
        }
      </div>
    </div>
  }

  @if ((filterLoading$ | async) || (loading$ | async)) {
    <app-loading></app-loading>
  }

  @if (error$ | async) {
    <div class="centered-div">
      <h2>{{'notification.no-data' | translate}}</h2>
    </div>
  }

  <div
    appWidgetGrid
    [pageType]="pageType"
    [isRange]="isRange"
    [ngStyle]="{display: (filterLoading$ | async) ? 'none' : 'grid', visibility: (loading$ | async) ? 'hidden' : 'visible'}"
    class="widget-grid-container"
    >
    <ng-template appWidget></ng-template>
  </div>
</div>
