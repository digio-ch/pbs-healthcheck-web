<app-widget-wrapper pageType="overview" [filterLoadable]="filterFacade">
  <ng-container filter>
    <app-department-filter>
      <ng-template #settings>
        <app-overview-settings-view 
          [sharing]="sharing()" 
          [editable]="isOwner()" 
          (shareChange)="updateSharing($event)" 
        />
      </ng-template>
    </app-department-filter>
  </ng-container>
</app-widget-wrapper>
