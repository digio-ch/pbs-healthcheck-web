@if (loading) {
  <app-loading [position]="'relative'"></app-loading>
}

@if (!loading) {
  <div class="chart-container" #chartContainer>
    <app-custom-pie-chart
      [preview]="true"
      [animations]="false"
      [scheme]="colorScheme"
      [results]="chartData"
      [legend]="false"
      [legendPosition]="legendPosition"
      [trimLabels]="false"
      [doughnut]="false">
    </app-custom-pie-chart>
    <p class="title">
      {{ ('chart.departments-' + (departmentCount === 1 ? 'one' : 'many')) | translate: { count: departmentCount } }}
    </p>
  </div>
}
