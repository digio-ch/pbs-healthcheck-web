@if (loading) {
  <app-loading [position]="'relative'" />
}

@if (!loading) {
  <div class="chart-container" #chartContainer>
    <app-custom-pie-chart
      [view]="[chartContainer.clientWidth*1.4, chartContainer.clientHeight]"
      [showLabels]="false"
      [showPercentages]="false"
      [animations]="false"
      [scheme]="colorScheme"
      [results]="chartData"
      [legend]="false"
      [legendPosition]="legendPosition"
      [trimLabels]="false"
      [doughnut]="false">
    </app-custom-pie-chart>
    <p class="title">
      {{ ('departments.count-' + (departmentCount === 1 ? 'one' : 'many')) | translate: { count: departmentCount } }}
    </p>
  </div>
}
