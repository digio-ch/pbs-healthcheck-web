<div class="content-wrapper">
  <!-- acts as spacer here -->
  <div class="content-header"></div>

  <app-loading *ngIf="loading"></app-loading>
  
  <div class="card" *ngIf="!loading">
    <div class="card-header">
      <h2>{{ 'apps.overview-departments.name' | translate }}</h2>
    </div>
  
    <div class="card-content regions-gap" *ngIf="!loading">
      <div *ngFor="let region of regions" class="region">
        <p *ngIf="region.name">{{ region.name }}</p>
        <div class="departments-wrapper">
          <div *ngFor="let department of region.children" class="department" [routerLink]="[department.id]">
            <div class="chart">
              <app-custom-pie-chart
                [preview]="true"
                [animations]="false"
                [scheme]="getColorSchema(department)"
                [results]="department.groupTypes"
                [legend]="false"
                [legendPosition]="legendPosition"
                [trimLabels]="false"
                [doughnut]="false">
              </app-custom-pie-chart>
            </div>
            <p>{{ department.name }}</p>
          </div>
        </div>
      </div>
      <div *ngIf="regions.length === 0" class="center">
          <span>{{ 'apps.overview-departments.no-data' | translate }}</span>
      </div>
    </div>
  </div>
</div>
