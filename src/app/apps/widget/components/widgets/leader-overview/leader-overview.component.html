<div class="widget-card">
  <div class="card-header">
    <h2 class="chart-title"></h2>
    <app-info class="chart-info" messageKey="chart.leader-overview.info" iconClass="icon-info" colorCode="blue"></app-info>
  </div>
  @if (showIndicators) {
    <div class="scroll-indicator left" #leftIndicator @fadeOut>
      <i class="icon-arrow-left"></i>
    </div>
  }
  <div class="leader-overview-flex-container" [style.cursor]="cursor" #itemContainer (mousedown)="mouseDown($event)" (mouseup)="mouseUp($event)" (mousemove)="mouseMove($event)">
    @for (g of leaderData; track g) {
      <app-leader-overview-section [group]="g"></app-leader-overview-section>
    }
  </div>
  @if (showIndicators) {
    <div class="scroll-indicator right" #rightIndicator @fadeOut>
      <i class="icon-arrow-right"></i>
    </div>
  }
</div>
