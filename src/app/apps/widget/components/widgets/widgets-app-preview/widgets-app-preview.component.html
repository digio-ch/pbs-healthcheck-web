
@if (loading) {
  <app-loading [position]="'relative'" />
}

@if (!loading) {
  <div class="chart-container" #chartContainer>
    <app-custom-pie-chart
      [view]="[350, 400]"
      [showLabels]="false"
      [animations]="false"
      [scheme]="colorScheme"
      [results]="chartData"
      [legend]="false"
      [legendPosition]="legendPosition"
      [trimLabels]="false"
      [doughnut]="false">
    </app-custom-pie-chart>
  </div>
}
