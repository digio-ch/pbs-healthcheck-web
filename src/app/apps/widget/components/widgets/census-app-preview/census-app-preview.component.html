@if (loading) {
  <app-loading [position]="'relative'"></app-loading>
}
@if (!loading) {
  <div style="position: relative;height: 100%; width: 100%; margin-top: auto">
    <canvas baseChart
      [data]="barChartData"
      [options]="barChartOptions"
      [plugins]="barChartPlugins"
      [legend]="barChartLegend"
      [type]="'bar'">
    </canvas>
  </div>
}
