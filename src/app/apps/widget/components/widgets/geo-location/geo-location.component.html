
<div class="widget-card">
  <div class="card-header">
    <h2 class="chart-title">{{ 'chart.geo-location.title' | translate }}</h2>
    @if (notFound > 0) {
      <app-info class="chart-info" messageKey="chart.geo-location.missing-info" [messageParams]="{missing: notFound}" iconClass="icon-info" colorCode="blue" position="top"></app-info>
    }
    @if (notFound === 0) {
      <app-info class="chart-info" messageKey="chart.geo-location.data-info" iconClass="icon-info" colorCode="blue" position="top"></app-info>
    }
  </div>
  <div class="chart-container">
    <div #map id="map"></div>
  </div>
</div>
