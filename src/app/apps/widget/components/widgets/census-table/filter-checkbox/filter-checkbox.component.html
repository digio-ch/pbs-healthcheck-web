<div>
  @if (state === FilterCheckBoxState.enabled) {
    <mat-icon>check_box</mat-icon>
  }
  @if (state === FilterCheckBoxState.disabled) {
    <mat-icon>check_box_outline_blank</mat-icon>
  }
  @if (state === FilterCheckBoxState.mixed) {
    <mat-icon>indeterminate_check_box</mat-icon>
  }
</div>
